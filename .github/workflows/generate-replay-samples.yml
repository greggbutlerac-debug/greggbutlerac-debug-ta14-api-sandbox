name: Generate Replay Samples

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate replay samples
        run: python -m examples.generate_replay_samples --overwrite

      - name: Commit generated samples
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add samples/
          if git diff --cached --quiet; then
            echo "No generated sample changes to commit."
            exit 0
          fi
          git commit -m "Generate public replay sample packages"
          git push
